<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon (monogram). Swap for your own if you like. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#FAFAFA" />

    <!-- Primary meta -->
    <title>Alexandros Hashemakis — Product Design Leader</title>
    <meta
      name="description"
      content="Product design leader with 15 years' experience. A decade leading design across Saudi Arabia's leading travel platform — turning design into measurable growth."
    />
    <meta name="author" content="Alexandros Hashemakis" />

    <!-- Open Graph / social sharing. Replace og:url + og:image with your live URLs. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Alexandros Hashemakis — Product Design Leader" />
    <meta
      property="og:description"
      content="Product design leader who turns design into measurable growth. 15 years designing digital products; a decade leading design at Saudi Arabia's leading travel platform."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://your-domain.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alexandros Hashemakis — Product Design Leader" />
    <meta
      name="twitter:description"
      content="Product design leader who turns design into measurable growth."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Inter as a graceful fallback when SF Pro isn't on the system. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
